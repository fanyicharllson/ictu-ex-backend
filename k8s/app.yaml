apiVersion: apps/v1
kind: Deployment
metadata:
  name: ictu-ex-app
  namespace: ictu-ex
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ictu-ex-app
  template:
    metadata:
      labels:
        app: ictu-ex-app
    spec:
      containers:
        - name: ictu-ex-app
          image: charllson717/ictu-ex-backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/ictuex
            - name: SPRING_DATASOURCE_USERNAME
              value: ictuex_user
            - name: SPRING_DATASOURCE_PASSWORD
              value: ictuex_pass
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: ictu-ex-app
  namespace: ictu-ex
spec:
  selector:
    app: ictu-ex-app
  ports:
    - port: 8080
      targetPort: 8080