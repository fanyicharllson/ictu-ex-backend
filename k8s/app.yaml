apiVersion: apps/v1
kind: Deployment
metadata:
  name: ictu-ex-app
  namespace: ictu-ex
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ictu-ex-app
  template:
    metadata:
      labels:
        app: ictu-ex-app
    spec:
      containers:
        - name: ictu-ex-app
          image: charllson717/ictu-ex-backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: ictu-ex-secrets
                  key: DB_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ictu-ex-secrets
                  key: DB_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ictu-ex-secrets
                  key: DB_PASSWORD
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: kafka.ictu-ex.svc.cluster.local:9092
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ictu-ex-secrets
                  key: JWT_SECRET
            - name: JWT_EXPIRES
              valueFrom:
                secretKeyRef:
                  name: ictu-ex-secrets
                  key: JWT_EXPIRES
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ictu-ex-secrets
                  key: RESEND_API_KEY
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: ictu-ex-app
  namespace: ictu-ex
spec:
  selector:
    app: ictu-ex-app
  ports:
    - port: 8080
      targetPort: 8080