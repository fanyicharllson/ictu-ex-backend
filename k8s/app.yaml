apiVersion: apps/v1
kind: Deployment
metadata:
  name: ictu-ex-app
  namespace: ictu-ex
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ictu-ex-app
  template:
    metadata:
      labels:
        app: ictu-ex-app
    spec:
      containers:
        - name: ictu-ex-app
          image: charllson717/ictu-ex-backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres:5432/ictuex"
            - name: SPRING_DATASOURCE_USERNAME
              value: "ictuex_user"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "ictuex_pass"
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:9092"
            # Override Hibernate to 'update' so it builds the schema on first run
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: "update"
            # Ensure Flyway is active for your new migration files
            - name: SPRING_FLYWAY_ENABLED
              value: "true"
            # JWT Configuration from Secrets
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ictu-ex-secrets
                  key: JWT_SECRET
            - name: JWT_EXPIRES
              valueFrom:
                secretKeyRef:
                  name: ictu-ex-secrets
                  key: JWT_EXPIRES
            # Email/Notification Configuration from Secrets
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ictu-ex-secrets
                  key: RESEND_API_KEY
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60  # Increased to 60s
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 120 # Increased to 120s
            periodSeconds: 15
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: ictu-ex-app
  namespace: ictu-ex
spec:
  selector:
    app: ictu-ex-app
  ports:
    - port: 8080
      targetPort: 8080
