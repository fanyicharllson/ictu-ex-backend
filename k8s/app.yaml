apiVersion: apps/v1
kind: Deployment
metadata:
  name: ictu-ex-app
  namespace: ictu-ex
spec:
  replicas: 2
  # Strategy ensures one pod stays up while the other restarts
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: ictu-ex-app
  template:
    metadata:
      labels:
        app: ictu-ex-app
    spec:
      # This gives Kafka/Postgres time to initialize before the app starts
      terminationGracePeriodSeconds: 30
      containers:
        - name: ictu-ex-app
          image: charllson717/ictu-ex-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: ictu-ex-secrets
                  key: DB_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ictu-ex-secrets
                  key: DB_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ictu-ex-secrets
                  key: DB_PASSWORD
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: kafka.ictu-ex.svc.cluster.local:9092
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ictu-ex-secrets
                  key: JWT_SECRET
            - name: JWT_EXPIRES
              valueFrom:
                secretKeyRef:
                  name: ictu-ex-secrets
                  key: JWT_EXPIRES
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ictu-ex-secrets
                  key: RESEND_API_KEY

          # 1. STARTUP PROBE: Prevents Liveness from killing the app during boot
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            failureThreshold: 20 # 20 * 10s = 200 seconds total startup time
            periodSeconds: 10

          # 2. READINESS PROBE: Controls when traffic starts flowing
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3

          # 3. LIVENESS PROBE: Restarts pod only if it truly hangs (deadlock)
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
            failureThreshold: 5 # Be more forgiving than readiness

          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"

          # 4. LIFECYCLE HOOK: Ensures the app stops accepting traffic before shutting down
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 10"]
---
apiVersion: v1
kind: Service
metadata:
  name: ictu-ex-app
  namespace: ictu-ex
spec:
  selector:
    app: ictu-ex-app
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
