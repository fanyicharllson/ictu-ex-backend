spring.application.name=ictu-ex-backend

# Database - local docker
spring.datasource.url=jdbc:postgresql://localhost:5433/ictuex
spring.datasource.username=ictuex_user
spring.datasource.password=ictuex_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
logging.level.org.flywaydb=DEBUG

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.jpa.open-in-view=false

# Actuator for Prometheus
management.endpoints.web.exposure.include=health,prometheus,info
management.endpoint.prometheus.enabled=true
management.prometheus.metrics.export.enabled=true

# JWT Settings (Used by the Auth module)
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRES}

# resend api key(Used by notification module)
resend.api.key=${RESEND_API_KEY}

# Jackson Settings
spring.jackson.deserialization.fail-on-unknown-properties=false
