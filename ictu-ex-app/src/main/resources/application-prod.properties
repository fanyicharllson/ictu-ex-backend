# Production — DigitalOcean Managed PostgreSQL
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
server.port=8080

# Connection pool settings for managed DB
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Flyway — runs migrations on managed DB
spring.flyway.enabled=true

# Kafka
spring.kafka.bootstrap-servers=kafka.ictu-ex.svc.cluster.local:9092
spring.kafka.admin.properties.bootstrap.servers=kafka.ictu-ex.svc.cluster.local:9092

# Redis — k8s internal DNS
spring.data.redis.host=redis.ictu-ex.svc.cluster.local
spring.data.redis.port=6379