org.gradle.java.installations.auto-detect=true
org.gradle.java.installations.auto-download=true
org.gradle.java.installations.fromEnv=JAVA_HOME

# Force Gradle to only use 1 worker instead of running tasks in parallel
org.gradle.workers.max=1

# Throttle the background daemon memory footprint to 1GB maximum
org.gradle.jvmargs=-Xmx1024m -XX:MaxMetaspaceSize=512m

# Prevent lingering daemons from locking up RAM after the build finishes
org.gradle.daemon=false
